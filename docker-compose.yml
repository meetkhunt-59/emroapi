
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  emroapi:
    build: .
    platform: linux/amd64 
    container_name: emroapi
    ports:
      - "9000:9000"
    restart: always
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
      - ./tools:/app/tools
      - ./storage:/app/storage
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    restart: always
    depends_on:
      - prometheus

volumes:
  grafana-storage:
