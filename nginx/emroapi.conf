upstream emroapi {
    server 127.0.0.1:9000;  # Your FastAPI app port from Dockerfile
    keepalive 32;  # Keep connections alive
}

# Main server
server {
    listen 80;
    server_name 35.239.124.112 emroapi.mooo.com  emroapi.work.gd;  # Your IP address
    
    # SSL Security Settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # HSTS (uncomment if you're sure)
    # add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Root directory for static files
    root /app/storage;
    
    # File upload settings
    client_max_body_size 20M;  # Match your MAX_FILE_SIZE_MB setting
    
    # Logs
    access_log /var/log/nginx/emroapi_access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/emroapi_error.log warn;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: http: optimisticleave.com tatteredpassenger.com www.kindhearted-side.pro kindhearted-side.pro; style-src 'self' 'unsafe-inline';" always;
    
    # Proxy settings
    location / {
        proxy_pass http://emroapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Serve uploaded files directly
    location /storage/ {
        alias /app/storage/;
        expires 1h;
        add_header Cache-Control "public, no-transform";
        
        # Only allow specific file types
        location ~* \.(png|jpg|jpeg|svg|dst)$ {
            try_files $uri =404;
        }
        
        # Deny access to all other files
        location ~ .* {
            return 403;
        }
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}